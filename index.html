<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>コーヒー販売量・焙煎管理アプリ</title>
<style>
  :root {
    --bg: #faf8f5;
    --surface: #ffffff;
    --surface2: #f5f2ee;
    --border: #e0d9d0;
    --border2: #c8bfb2;
    --text: #2c2416;
    --text2: #6b5e4e;
    --text3: #9e8e7a;
    --accent: #6b3d1e;
    --accent-light: #c4794a;
    --accent-bg: #fdf3ec;
    --green: #2e7d52;
    --green-bg: #eaf5ef;
    --red: #c0392b;
    --red-bg: #fdecea;
    --blue: #1a5a9a;
    --blue-bg: #e8f2fb;
    --amber: #b07d1a;
    --amber-bg: #fdf5e0;
    --shadow: 0 2px 8px rgba(44,36,22,0.08);
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }
  h1 { font-size: 20px; font-weight: 700; }
  h2 { font-size: 16px; font-weight: 600; }
  h3 { font-size: 14px; font-weight: 600; }
  button { cursor: pointer; border: none; border-radius: var(--radius); font-family: inherit; font-size: 13px; transition: all 0.15s; }
  input, select, textarea { font-family: inherit; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; background: var(--surface); color: var(--text); outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent-light); box-shadow: 0 0 0 2px rgba(107,61,30,0.12); }
  table { border-collapse: collapse; width: 100%; }
  th { background: var(--surface2); font-weight: 600; font-size: 12px; color: var(--text2); padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
  tr:hover td { background: var(--surface2); }

  /* Layout */
  #app { display: flex; min-height: 100vh; }
  .sidebar { width: 200px; min-width: 200px; background: var(--accent); color: white; padding: 0; display: flex; flex-direction: column; }
  .sidebar-logo { padding: 20px 16px 16px; border-bottom: 1px solid rgba(255,255,255,0.15); }
  .sidebar-logo h1 { font-size: 14px; line-height: 1.4; color: white; }
  .sidebar-logo p { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 4px; }
  .sidebar-nav { flex: 1; padding: 12px 0; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 10px 16px; color: rgba(255,255,255,0.75); cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
  .nav-item.active { background: rgba(255,255,255,0.2); color: white; font-weight: 600; }
  .nav-icon { font-size: 14px; width: 16px; text-align: center; }
  .main { flex: 1; overflow: auto; }
  .main-inner { padding: 24px; max-width: 1400px; }
  .page-header { margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
  .page-title { font-size: 18px; font-weight: 700; color: var(--text); }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; }
  .card + .card { margin-top: 16px; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

  /* Buttons */
  .btn { padding: 7px 14px; font-size: 13px; border-radius: var(--radius); font-weight: 500; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-light); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid #f5c6c2; }
  .btn-danger:hover { background: #f9d7d5; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-icon { padding: 5px 8px; font-size: 13px; background: var(--surface2); border: 1px solid var(--border); }
  .btn-icon:hover { background: var(--border); }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 600; }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); }
  .badge-gray { background: var(--surface2); color: var(--text2); }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab { padding: 8px 14px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text2); transition: all 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .tab:hover { color: var(--text); }

  /* Form */
  .form-row { display: flex; gap: 12px; margin-bottom: 10px; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .form-group input, .form-group select { width: 100%; }

  /* Grid */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* Stat cards */
  .stat-card { background: var(--surface2); border-radius: var(--radius); padding: 12px 16px; }
  .stat-label { font-size: 11px; color: var(--text3); font-weight: 500; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-unit { font-size: 13px; color: var(--text2); margin-left: 3px; }

  /* Alert */
  .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 12px; }
  .alert-info { background: var(--blue-bg); color: var(--blue); border: 1px solid #b8d4f0; }
  .alert-warning { background: var(--amber-bg); color: var(--amber); border: 1px solid #e8c97a; }
  .alert-success { background: var(--green-bg); color: var(--green); border: 1px solid #a5d8be; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text2); padding: 2px 6px; }

  /* Upload zone */
  .upload-zone { border: 2px dashed var(--border2); border-radius: var(--radius-lg); padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .upload-zone:hover { border-color: var(--accent-light); background: var(--accent-bg); }
  .upload-zone p { color: var(--text2); font-size: 13px; }

  /* Table actions */
  .table-actions { display: flex; gap: 6px; }

  /* Print styles */
  @media print {
    .sidebar, .no-print, .sidebar-nav, nav, .fb-user-bar { display: none !important; }
    .app { display: block !important; height: auto !important; }
    .main { width: 100% !important; overflow: visible !important; margin-left: 0 !important; position: static !important; }
    .main-inner { padding: 4px; max-width: none; }
    body { background: white; font-size: 10pt; padding-bottom: 0 !important; }
    .card { border: 1px solid #999; box-shadow: none; break-inside: avoid; margin: 0 0 8px 0; padding: 8px; }
    .delivery-store-block { page-break-after: always; margin-bottom: 0; }
    .delivery-store-block:last-child { page-break-after: avoid; }
    .delivery-print-card { border: 1.5px solid #555 !important; }
    .forecast-store-block { page-break-inside: avoid; margin-bottom: 12px; }
    .scroll-x { overflow: visible; }
    h1, h2, h3 { font-size: 12pt; }
    th { font-size: 9pt; padding: 3px 5px; }
    td { font-size: 9pt; padding: 3px 5px; }
    .badge { border: 1px solid #999; font-size: 8pt; }
    .stat-card, .alert { display: none; }
    .tabs { display: none; }
    .page-header { display: none; }
    .mt-12 { margin-top: 4px; }
    .forecast-print-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  }
  @media screen {
    .print-only { display: none !important; }
    .forecast-print-header { display: none; }
  }
  @media print {
    .print-only { display: block !important; }
    .no-print { display: none !important; }
    .forecast-print-header { display: flex !important; }
  }

  .scroll-x { overflow-x: auto; }
  .text-right { text-align: right; }
  .text-center { text-align: center; }
  .flex { display: flex; }
  .flex-col { flex-direction: column; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .gap-16 { gap: 16px; }
  .mt-8 { margin-top: 8px; }
  .mt-12 { margin-top: 12px; }
  .mt-16 { margin-top: 16px; }
  .mt-20 { margin-top: 20px; }
  .mb-8 { margin-bottom: 8px; }
  .mb-12 { margin-bottom: 12px; }
  .fw-600 { font-weight: 600; }
  .text-sm { font-size: 12px; color: var(--text2); }
  .text-xs { font-size: 11px; color: var(--text3); }
  .w-full { width: 100%; }
  .highlight { background: var(--accent-bg); }

  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .drag-handle { cursor: grab; color: var(--text3); padding: 2px 4px; }
  .drag-handle:active { cursor: grabbing; }
</style>

<script>

const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ===== 定数 =====

];

const DEFAULT_STORES = [
  { id: 's1', name: '1号車' },
  { id: 's2', name: '2号車' },
  { id: 's3', name: '3号車' },

];

const BAG_WEIGHT = 5000; // g
const BATCH_BAGS = 4;
const BATCH_WEIGHT = BATCH_BAGS * BAG_WEIGHT; // 20000g per batch

function generateId() { return 'id_' + Math.random().toString(36).substr(2, 9); }

// ===== ドラッグ&ドロップ対応ファイル選択ゾーン =====
function DropZone({ onFile, accept, message, subMessage, status }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef(null);

  function handleDrop(e) {
    e.preventDefault();
    e.stopPropagation();
    setDragging(false);
    const file = e.dataTransfer?.files?.[0];
    if (file) onFile(file);
  }
  function handleDragOver(e) { e.preventDefault(); setDragging(true); }
  function handleDragLeave(e) { e.preventDefault(); setDragging(false); }
  function handleChange(e) {
    const file = e.target.files?.[0];
    if (file) onFile(file);
    e.target.value = '';
  }

  return React.createElement('div', {
    onClick: () => inputRef.current?.click(),
    onDrop: handleDrop,
    onDragOver: handleDragOver,
    onDragLeave: handleDragLeave,
    style: {
      border: dragging ? '2px solid var(--accent-light)' : '2px dashed var(--border2)',
      borderRadius: 'var(--radius-lg)',
      padding: '28px 24px',
      textAlign: 'center',
      cursor: 'pointer',
      background: dragging ? 'var(--accent-bg)' : 'var(--surface)',
      transition: 'all 0.15s',
      userSelect: 'none',
    }
  },
    React.createElement('div', { style: { fontSize: 32, marginBottom: 8 } }, dragging ? '📥' : '📂'),
    React.createElement('div', { style: { fontWeight: 600, fontSize: 14, color: 'var(--text)', marginBottom: 4 } },
      dragging ? 'ここで放してください' : message
    ),
    React.createElement('div', { style: { fontSize: 12, color: 'var(--text2)', marginBottom: 8 } }, subMessage),
    status && React.createElement('div', {
      style: { marginTop: 8, fontSize: 13, fontWeight: 600,
        color: status.startsWith('エラー') ? 'var(--red)' : 'var(--accent)' }
    }, status),
    React.createElement('input', {
      ref: inputRef,
      type: 'file',
      accept: accept,
      style: { display: 'none' },
      onChange: handleChange,
    })
  );
}


// ===== 日付ユーティリティ（多形式対応・タイムゾーン安全）=====
// 各種形式の日付文字列 → {y, m, d} に正規化
function parseDateStr(raw) {
  if (!raw && raw !== 0) return null;
  const s = String(raw).trim();
  if (!s || s === '-' || s === '') return null;

  // Excelシリアル値（数字のみ・5桁程度）
  if (/^\d{4,6}$/.test(s) && parseInt(s) > 40000 && parseInt(s) < 60000) {
    // Excelシリアル値: 1900/1/1 = 1 基準（Excelのうるう年バグ含む）
    const serial = parseInt(s);
    const excelEpoch = new Date(1899, 11, 30); // 1899-12-30
    const ms = excelEpoch.getTime() + serial * 86400000;
    const dt = new Date(ms);
    return { y: dt.getFullYear(), m: dt.getMonth() + 1, d: dt.getDate() };
  }

  // YYYY-MM-DD 形式
  let m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if (m) return { y: parseInt(m[1]), m: parseInt(m[2]), d: parseInt(m[3]) };

  // YYYY年M月D日 形式
  m = s.match(/^(\d{4})年(\d{1,2})月(\d{1,2})日?$/);
  if (m) return { y: parseInt(m[1]), m: parseInt(m[2]), d: parseInt(m[3]) };

  // M/D/YYYY 形式（米国式）
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return { y: parseInt(m[3]), m: parseInt(m[1]), d: parseInt(m[2]) };

  return null;
}

function dowFromDateStr(dateStr) {
  const p = parseDateStr(dateStr);
  if (!p) return 0;
  return new Date(p.y, p.m - 1, p.d).getDay();
}

function fmtDate(dateStr) {
  const p = parseDateStr(dateStr);
  if (!p) return '-';
  const dow = ['日','月','火','水','木','金','土'][new Date(p.y, p.m - 1, p.d).getDay()];
  return p.y + '/' + String(p.m).padStart(2,'0') + '/' + String(p.d).padStart(2,'0') + '(' + dow + ')';
}

// 日付を YYYY-MM-DD 標準形式に正規化（保存・比較用）
function normalizeDate(dateStr) {
  const p = parseDateStr(dateStr);
  if (!p) return dateStr || '';
  return p.y + '-' + String(p.m).padStart(2,'0') + '-' + String(p.d).padStart(2,'0');
}


// ===== 文字列正規化 =====
function normalizeStr(s) {
  if (!s) return '';
  return s
    .toLowerCase()
    // 全角英数→半角
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    // 全角スペース→半角
    .replace(/　/g, ' ')
    // 小文字カタカナ→大文字カタカナ（ァ→ア、ィ→イ、ゥ→ウ、ェ→エ、ォ→オ、ッ→ツ、ャ→ヤ、ュ→ユ、ョ→ヨ）
    .replace(/ァ/g,'ア').replace(/ィ/g,'イ').replace(/ゥ/g,'ウ').replace(/ェ/g,'エ').replace(/ォ/g,'オ')
    .replace(/ッ/g,'ツ').replace(/ャ/g,'ヤ').replace(/ュ/g,'ユ').replace(/ョ/g,'ヨ')
    .replace(/ぁ/g,'あ').replace(/ぃ/g,'い').replace(/ぅ/g,'う').replace(/ぇ/g,'え').replace(/ぉ/g,'お')
    .replace(/っ/g,'つ').replace(/ゃ/g,'や').replace(/ゅ/g,'ゆ').replace(/ょ/g,'よ')
    // 複数スペース→1スペース
    .replace(/\s+/g, ' ')
    .trim();
}

function productNameMatch(csvName, productName) {
  const cn = normalizeStr(csvName.replace(/^\d+_/, ''));
  const pn = normalizeStr(productName);
  if (cn === pn) return 1.0;
  if (cn.includes(pn) || pn.includes(cn)) return 0.8;
  // キーワード一致
  const cnWords = cn.split(/[\s・\-]/);
  const pnWords = pn.split(/[\s・\-]/);
  let matches = 0;
  for (const w of cnWords) {
    if (w.length > 1 && pnWords.some(pw => pw.includes(w) || w.includes(pw))) matches++;
  }
  if (cnWords.length > 0 && matches / cnWords.length > 0.5) return 0.5;
  return 0;
}

// ===== LocalStorage =====
const _localCache = {};
function loadState(key, defaultValue) {
  if(_localCache[key] !== undefined) return _localCache[key];
  return defaultValue;
}
function saveState(key, value) {
  _localCache[key] = value;
  if(window._saveToFirestore) window._saveToFirestore(_localCache);
}
function _initFromFirestore(data) {
  if(!data) return;
  console.log('Firestore読み込みデータ:', Object.keys(data));
  Object.keys(data).forEach(k => { _localCache[k] = data[k]; });
}

// ===== 予測ロジック =====
function buildHistoryIndex(salesHistory, products, productMapping) {
  const idx = {};
  for (const prod of products) idx[prod.id] = [];
  const mappedIds = {};
  for (const [csvName, pid] of Object.entries(productMapping)) mappedIds[normalizeStr(csvName)] = pid;
  for (const row of salesHistory) {
    let pid = row.productId;
    if (!pid) {
      pid = mappedIds[normalizeStr(row.productNameRaw)];
      if (!pid) {
        let best = 0;
        for (const prod of products) {
          const sc = productNameMatch(normalizeStr(row.productNameRaw), normalizeStr(prod.name));
          if (sc > best) { best = sc; pid = prod.id; }
        }
        if (best < 0.4) pid = null;
      }
    }
    if (pid && idx[pid]) idx[pid].push(row);
  }
  return idx;
}

function computeForecast(schedule, historyIndex, products) {
  const targetDow = dowFromDateStr(schedule.date);
  const targetLoc = (schedule.location || '').trim();
  const targetStoreId = schedule.storeId;
  const result = {};
  const norm = loc => (loc || '').trim();

  for (const prod of products) {
    const h = historyIndex[prod.id] || [];
    if (h.length === 0) { result[prod.id] = 0; continue; }

    let matched = [];

    // Lv1: 同じ場所 × 同じ店舗 × 同じ曜日
    matched = h.filter(r => norm(r.location) === targetLoc && r.storeId === targetStoreId && dowFromDateStr(r.date) === targetDow);
    if (matched.length > 0) { result[prod.id] = Math.round(avg(matched) * 1.1); continue; }

    // Lv2: 同じ場所 × 同じ店舗
    matched = h.filter(r => norm(r.location) === targetLoc && r.storeId === targetStoreId);
    if (matched.length > 0) { result[prod.id] = Math.round(avg(matched) * 1.1); continue; }

    // Lv3: 同じ場所 × 同じ曜日（他店含む）
    if (targetLoc) {
      matched = h.filter(r => norm(r.location) === targetLoc && dowFromDateStr(r.date) === targetDow);
      if (matched.length > 0) { result[prod.id] = Math.round(avg(matched) * 1.1); continue; }
    }

    // Lv4: 同じ場所（他店含む）
    if (targetLoc) {
      matched = h.filter(r => norm(r.location) === targetLoc);
      if (matched.length > 0) { result[prod.id] = Math.round(avg(matched) * 1.1); continue; }
    }

    // Lv5: 代替場所 × 同じ店舗
    if (schedule.altLocation) {
      const altLoc = schedule.altLocation.trim();
      matched = h.filter(r => norm(r.location) === altLoc && r.storeId === targetStoreId);
      if (matched.length > 0) { result[prod.id] = Math.round(avg(matched) * 1.1); continue; }
      matched = h.filter(r => norm(r.location) === altLoc);
      if (matched.length > 0) { result[prod.id] = Math.round(avg(matched) * 1.1); continue; }
    }

    // Lv6: 代替店舗 × 同じ場所
    if (schedule.altStoreId && targetLoc) {
      matched = h.filter(r => norm(r.location) === targetLoc && r.storeId === schedule.altStoreId);
      if (matched.length > 0) { result[prod.id] = Math.round(avg(matched) * 1.1); continue; }
    }

    // Lv7: 同じ店舗 × 同じ曜日
    matched = h.filter(r => r.storeId === targetStoreId && dowFromDateStr(r.date) === targetDow);
    if (matched.length > 0) { result[prod.id] = Math.round(avg(matched) * 1.1); continue; }

    // Lv8: 同じ店舗
    matched = h.filter(r => r.storeId === targetStoreId);
    if (matched.length > 0) { result[prod.id] = Math.round(avg(matched) * 1.1); continue; }

    // Lv9: 同じ曜日（全店）
    matched = h.filter(r => dowFromDateStr(r.date) === targetDow);
    if (matched.length > 0) { result[prod.id] = Math.round(avg(matched) * 1.1); continue; }

    // Lv10: 全体平均
    result[prod.id] = Math.round(avg(h) * 1.1);
  }
  return result;
}

function avg(rows) {
  if (!rows.length) return 0;
  return rows.reduce((s, r) => s + (parseFloat(r.salesG) || 0), 0) / rows.length;
}

// ===== 販売実績ページ =====
function SalesHistoryPage({ salesHistory, setSalesHistory, products, stores, productMapping, setProductMapping, pendingMappings, setPendingMappings }) {
  const [showMapping, setShowMapping] = useState(false);
  const [tempMapping, setTempMapping] = useState({});
  const [localPending, setLocalPending] = useState([]);
  const [filterStore, setFilterStore] = useState('');
  const [parseMsg, setParseMsg] = useState('');

  // CSVカラムを柔軟に検索するヘルパー
  function getCol(row, candidates) {
    for (const c of candidates) {
      if (row[c] !== undefined && row[c] !== '') return row[c];
    }
    // 部分一致でも探す
    const keys = Object.keys(row);
    for (const c of candidates) {
      const found = keys.find(k => k.includes(c));
      if (found && row[found] !== undefined && row[found] !== '') return row[found];
    }
    return '';
  }

  function handleCSV(e) {
    const file = e.target.files[0];
    if (!file) return;
    setParseMsg('読み込み中...');

    // Shift_JIS / UTF-8 両対応：まずUTF-8で試み、文字化けなら再試行
    function parseWithEncoding(encoding, onDone) {
      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        encoding: encoding,
        complete: onDone,
        error: (err) => setParseMsg('読み込みエラー: ' + err.message)
      });
    }

    function processResults(results, usedEncoding) {
      const rows = results.data;
      if (!rows.length) {
        // UTF-8で0件ならShift_JISで再試行
        if (usedEncoding === 'UTF-8') {
          parseWithEncoding('Shift_JIS', r => processResults(r, 'Shift_JIS'));
        } else {
          setParseMsg('データが見つかりませんでした（列名を確認してください）');
        }
        return;
      }

      const cols = Object.keys(rows[0]);

      // 先頭行で列の役割を自動判定
      // 商品名列：「価格_商品名」形式の値を含む列、または「商品名」を含む列名
      const productCol = cols.find(c => rows.slice(0,10).some(r => /^\d+[_\-]/.test(String(r[c] || ''))))
        || cols.find(c => c.includes('商品'));
      // 販売量列：数値が入っていて量・数・合計を含む列名
      const salesCol = cols.find(c => ['販売量合計','販売量','販売数','数量','合計','売上'].some(k => c.includes(k)));
      // 日付列
      const dateCol = cols.find(c => ['日付','date','Date','日時','出店日'].some(k => c.includes(k)));
      // 場所列
      const locCol = cols.find(c => ['場所','location','出店場所','イベント','会場'].some(k => c.includes(k)));
      // 店舗列
      const storeCol = cols.find(c => ['店舗','store','車両','号車','車番','担当'].some(k => c.includes(k)));

      const autoMappingAdditions = {};
      const unmappedNames = new Set();
      const newHistory = [];
      let skipCount = 0;

      for (const row of rows) {
        const dateVal = dateCol ? (row[dateCol] || '') : getCol(row, ['日付','date','Date','日時','出店日']);
        const locationVal = locCol ? (row[locCol] || '') : getCol(row, ['場所','location','出店場所','イベント名','イベント']);
        const storeVal = storeCol ? (row[storeCol] || '') : getCol(row, ['店舗','store','車両','号車','車番','担当']);
        const productNameRaw = productCol ? (row[productCol] || '') : getCol(row, ['商品名','product','商品']);
        const salesQty = salesCol ? (row[salesCol] || '0') : getCol(row, ['販売量合計','販売数','販売量','数量','売上数量','合計']);

        if (!productNameRaw || !dateVal) { skipCount++; continue; }

        const normDate = normalizeDate(String(dateVal));
        if (!normDate) { skipCount++; continue; }

        const cleanName = String(productNameRaw).replace(/^\d+[_\-]/, '').trim();
        if (!cleanName) { skipCount++; continue; }

        const salesG = (parseFloat(String(salesQty).replace(/[^\d.]/g, '')) || 0) * 100;

        let storeId = null;
        if (storeVal) {
          const ns = normalizeStr(String(storeVal));
          const matchedStore = stores.find(s => {
            const sn = normalizeStr(s.name);
            return ns === sn || ns.includes(sn) || sn.includes(ns);
          });
          if (matchedStore) storeId = matchedStore.id;
        }

        let productId = productMapping[cleanName] || autoMappingAdditions[cleanName] || null;
        if (!productId) {
          let bestScore = 0, bestProd = null;
          for (const p of products) {
            const score = productNameMatch(cleanName, p.name);
            if (score > bestScore) { bestScore = score; bestProd = p; }
          }
          if (bestScore >= 0.8 && bestProd) {
            productId = bestProd.id;
            autoMappingAdditions[cleanName] = productId;
          } else {
            unmappedNames.add(cleanName);
          }
        }

        newHistory.push({
          id: generateId(),
          date: normDate,
          location: String(locationVal).trim(),
          storeId,
          storeNameRaw: String(storeVal).trim(),
          productNameRaw: cleanName,
          productId,
          salesG,
        });
      }

      if (Object.keys(autoMappingAdditions).length > 0) {
        setProductMapping(prev => ({ ...prev, ...autoMappingAdditions }));
      }

      setSalesHistory(prev => {
        const existing = new Set(prev.map(r => `${r.date}|${r.location}|${r.storeId}|${r.productNameRaw}`));
        const toAdd = newHistory.filter(r => !existing.has(`${r.date}|${r.location}|${r.storeId}|${r.productNameRaw}`));
        return [...prev, ...toAdd];
      });

      const msg = `取り込み完了: ${newHistory.length}件追加${skipCount > 0 ? `（${skipCount}行スキップ）` : ''}【${usedEncoding}】`;
      setParseMsg(msg);

      if (unmappedNames.size > 0) {
        setLocalPending([...unmappedNames]);
        setPendingMappings([...unmappedNames]);
        setTempMapping({});
        setShowMapping(true);
      }
    }

    parseWithEncoding('UTF-8', r => processResults(r, 'UTF-8'));
    e.target.value = '';
  }

  function applyMapping() {
    // tempMapping: {csvName -> productId}
    const newMapping = { ...productMapping, ...tempMapping };
    setProductMapping(newMapping);
    // 未紐付きレコードに productId を反映
    setSalesHistory(prev => prev.map(r => {
      if (!r.productId && newMapping[r.productNameRaw]) {
        return { ...r, productId: newMapping[r.productNameRaw] };
      }
      return r;
    }));
    setShowMapping(false);
    setTempMapping({});
    setLocalPending([]);
  }

  function clearHistory() {
    if (confirm('実績データをすべて削除しますか？')) { setSalesHistory([]); setParseMsg(''); }
  }

  function exportCSV() {
    const rows = salesHistory.map(r => {
      const store = stores.find(s => s.id === r.storeId);
      const prod = products.find(p => p.id === r.productId);
      return {
        日付: r.date, 場所: r.location, 店舗: store ? store.name : r.storeNameRaw,
        商品名: r.productNameRaw, 商品: prod ? prod.name : '',
        販売量合計_100g単位: r.salesG / 100, 販売量g: r.salesG
      };
    });
    const csv = Papa.unparse(rows);
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'sales_history.csv'; a.click();
  }

  const displayed = salesHistory.filter(r => !filterStore || r.storeId === filterStore);
  const unmappedCount = salesHistory.filter(r => !r.productId).length;

  return React.createElement('div', null,
    React.createElement('div', { className: 'page-header' },
      React.createElement('h2', { className: 'page-title' }, '📋 販売実績データ'),
      React.createElement('div', { className: 'flex gap-8' },
        React.createElement('button', { className: 'btn btn-secondary btn-sm', onClick: exportCSV }, '⬇ CSVダウンロード'),
        React.createElement('button', { className: 'btn btn-danger btn-sm', onClick: clearHistory }, '全削除'),
      )
    ),

    React.createElement('div', { className: 'card mb-12' },
      React.createElement('div', { className: 'card-title' }, '📂 CSVファイルをアップロード'),
      React.createElement('div', { className: 'alert alert-info', style: { marginBottom: 12 } },
        React.createElement('div', null, '対応するCSV列名（いずれかが含まれていれば自動認識）:'),
        React.createElement('div', { style: { marginTop: 4, fontSize: 11 } },
          '日付: 「日付」「date」「出店日」 ／ 場所: 「場所」「出店場所」「イベント名」 ／ 店舗: 「店舗」「車両」「号車」',
        ),
        React.createElement('div', { style: { marginTop: 2, fontSize: 11 } },
          '商品名: 「商品名」（価格_商品名形式も対応）／ 販売量: 「販売量合計」「販売数」「数量」（100g単位）',
        ),
      ),
      React.createElement(DropZone, {
        accept: '.csv,.CSV',
        message: 'クリックまたはCSVファイルをここにドロップ',
        subMessage: `読み込み済み: ${salesHistory.length}件${unmappedCount > 0 ? ` ／ 未紐付き: ${unmappedCount}件` : ''}`,
        status: parseMsg,
        onFile: (file) => {
          setParseMsg('読み込み中...');

          function looksGarbled(rows) {
            if (!rows.length) return true;
            const sample = Object.keys(rows[0]).join('') + Object.values(rows[0]).join('');
            return sample.includes('\ufffd') || sample.includes('\u0083') || sample.includes('\u0093');
          }

          function processResults(rows, enc) {
            if (!rows.length) { setParseMsg('データが0件でした'); return; }
            const cols = Object.keys(rows[0] || {});

            // ===== 列名を柔軟に検出 =====
            // 完全一致→部分一致→値で推測、の順で探す
            function findCol(keys, valuePredicate) {
              // 列名の完全一致
              for (const k of keys) {
                const c = cols.find(c => c.trim() === k);
                if (c !== undefined) return c;
              }
              // 列名の部分一致
              for (const k of keys) {
                const c = cols.find(c => c.includes(k) || k.includes(c.trim()));
                if (c !== undefined) return c;
              }
              // 値で推測（valuePredicate が渡された場合）
              if (valuePredicate) {
                const c = cols.find(col =>
                  rows.slice(0, 20).some(r => valuePredicate(String(r[col] || '')))
                );
                if (c !== undefined) return c;
              }
              return null;
            }

            // 日付列：値が日付らしい列を推測
            const dateCol = findCol(
              ['日付','date','Date','日時','出店日','販売日'],
              v => /\d{4}[\-\/]\d{1,2}[\-\/]\d{1,2}/.test(v) || (/^\d{5,6}$/.test(v) && parseInt(v) > 40000)
            );
            // 商品名列：「数字_」始まりの値を含む列、または「商品」を含む列名
            const productCol = findCol(
              ['商品名','商品','product','品名','item'],
              v => /^\d+[_\-]/.test(v) || v.includes('ブレンド') || v.includes('コーヒー')
            );
            // 販売量列：数値が入っていて量・数・合計を含む列
            const salesCol = findCol(
              ['販売量合計','販売量','販売数','数量','合計','売上数量','売上','amount','qty','quantity'],
              v => /^\d+(\.\d+)?$/.test(v.trim()) && parseFloat(v) > 0
            );
            // 場所列
            const locCol = findCol(['場所','location','出店場所','イベント名','イベント','会場','venue'], null);
            // 店舗列
            const storeCol = findCol(['店舗名','店舗','store','車両名','車両','号車','車番','担当'], null);

            // デバッグ：検出結果をコンソールに出力
            console.log('列検出結果:', { dateCol, productCol, salesCol, locCol, storeCol });
            console.log('全列名:', cols);
            console.log('先頭行:', rows[0]);

            // 列が見つからない場合の詳細エラー
            const missing = [];
            if (!dateCol) missing.push('日付');
            if (!productCol) missing.push('商品名');
            if (!salesCol) missing.push('販売量');
            if (missing.length > 0) {
              setParseMsg(`列「${missing.join('・')}」が見つかりません。CSV列名: [${cols.join(', ')}]`);
              return;
            }

            const autoMap = {};
            const unmapped = new Set();
            const newHistory = [];
            let skipNoDate = 0, skipNoProd = 0;

            for (const row of rows) {
              const dateVal       = String(row[dateCol] || '').trim();
              const productNameRaw= String(row[productCol] || '').trim();
              const salesQtyRaw   = String(row[salesCol] || '0').trim();
              const locationVal   = locCol   ? String(row[locCol]   || '').trim() : '';
              const storeVal      = storeCol ? String(row[storeCol] || '').trim() : '';

              if (!dateVal)        { skipNoDate++; continue; }
              if (!productNameRaw) { skipNoProd++; continue; }

              const normDate = normalizeDate(dateVal);
              if (!normDate) { skipNoDate++; continue; }

              // 「価格_商品名」形式から商品名を取り出す
              const cleanName = productNameRaw.replace(/^\d+[_\-]\s*/, '').trim();
              if (!cleanName) { skipNoProd++; continue; }

              const salesG = (parseFloat(salesQtyRaw.replace(/[^\d.]/g, '')) || 0) * 100;

              // 店舗マッチング
              let storeId = null;
              if (storeVal) {
                const ns = normalizeStr(storeVal);
                const m = stores.find(s => {
                  const sn = normalizeStr(s.name);
                  return ns === sn || ns.includes(sn) || sn.includes(ns);
                });
                if (m) storeId = m.id;
              }

              // 商品マッチング
              let productId = productMapping[cleanName] || autoMap[cleanName] || null;
              if (!productId) {
                let best = 0, bestP = null;
                for (const p of products) {
                  const sc = productNameMatch(cleanName, p.name);
                  if (sc > best) { best = sc; bestP = p; }
                }
                if (best >= 0.5 && bestP) {
                  productId = bestP.id;
                  autoMap[cleanName] = productId;
                } else {
                  unmapped.add(cleanName);
                }
              }

              newHistory.push({
                id: generateId(),
                date: normDate,
                location: locationVal,
                storeId,
                storeNameRaw: storeVal,
                productNameRaw: cleanName,
                productId,
                salesG,
              });
            }

            if (Object.keys(autoMap).length > 0) {
              setProductMapping(prev => ({ ...prev, ...autoMap }));
            }

            setSalesHistory(prev => {
              const ex = new Set(prev.map(r => `${r.date}|${r.location}|${r.storeNameRaw}|${r.productNameRaw}`));
              const toAdd = newHistory.filter(r => !ex.has(`${r.date}|${r.location}|${r.storeNameRaw}|${r.productNameRaw}`));
              const dupCount = newHistory.length - toAdd.length;
              let msg = `完了: ${toAdd.length}件追加`;
              if (dupCount > 0) msg += `（重複${dupCount}件）`;
              if (skipNoDate > 0) msg += `、日付不明${skipNoDate}行`;
              if (skipNoProd > 0) msg += `、商品名空白${skipNoProd}行`;
              msg += ` [${enc}]`;
              setParseMsg(msg);
              return [...prev, ...toAdd];
            });

            if (unmapped.size > 0) {
              setLocalPending([...unmapped]);
              setPendingMappings([...unmapped]);
              setTempMapping({});
              setShowMapping(true);
            }
          }

          function tryShiftJIS() {
            Papa.parse(file, { header: true, skipEmptyLines: true, encoding: 'Shift_JIS',
              complete: (res2) => {
                if (!res2.data.length) return setParseMsg('データが読み取れませんでした。');
                processResults(res2.data, 'Shift_JIS');
              },
              error: (err) => setParseMsg('エラー: ' + err.message)
            });
          }

          Papa.parse(file, { header: true, skipEmptyLines: true, encoding: 'UTF-8',
            complete: (res) => {
              if (!res.data.length || looksGarbled(res.data)) { tryShiftJIS(); }
              else { processResults(res.data, 'UTF-8'); }
            },
            error: () => tryShiftJIS()
          });
        }
      }),
      unmappedCount > 0 && React.createElement('div', { style: { marginTop: 10 } },
        React.createElement('button', {
          className: 'btn btn-secondary btn-sm',
          onClick: () => {
            const names = [...new Set(salesHistory.filter(r => !r.productId).map(r => r.productNameRaw))];
            setLocalPending(names); setPendingMappings(names); setTempMapping({}); setShowMapping(true);
          }
        }, `⚠ 未紐付き商品を確認・設定する (${unmappedCount}件)`)
      )
    ),

    // 商品名マッピングモーダル
    showMapping && React.createElement('div', { className: 'modal-overlay' },
      React.createElement('div', { className: 'modal' },
        React.createElement('div', { className: 'modal-header' },
          React.createElement('span', { className: 'modal-title' }, '商品名の紐付け設定'),
          React.createElement('button', { className: 'modal-close', onClick: () => setShowMapping(false) }, '✕')
        ),
        React.createElement('p', { className: 'text-sm mb-12' },
          'CSV内の商品名と、アプリ内の商品を対応させてください。紐付けすることで予測精度が上がります。'
        ),
        localPending.map(csvName =>
          React.createElement('div', { key: csvName, className: 'form-group mb-12' },
            React.createElement('label', null, `CSV商品名: 「${csvName}」`),
            React.createElement('select', {
              value: tempMapping[csvName] || '',
              onChange: e => setTempMapping(prev => ({ ...prev, [csvName]: e.target.value }))
            },
              React.createElement('option', { value: '' }, '-- 対応商品を選択（不明はスキップ）--'),
              products.map(p => React.createElement('option', { key: p.id, value: p.id }, p.name))
            )
          )
        ),
        React.createElement('div', { className: 'flex gap-8 mt-16' },
          React.createElement('button', { className: 'btn btn-primary', onClick: applyMapping }, '保存して適用'),
          React.createElement('button', { className: 'btn btn-secondary', onClick: () => setShowMapping(false) }, 'あとで設定する'),
        )
      )
    ),

    React.createElement('div', { className: 'card' },
      React.createElement('div', { className: 'flex items-center justify-between mb-12' },
        React.createElement('div', { className: 'card-title' }, `実績一覧 (${displayed.length}件、新しい順100件表示)`),
        React.createElement('select', {
          value: filterStore,
          onChange: e => setFilterStore(e.target.value),
          style: { width: 120 }
        },
          React.createElement('option', { value: '' }, '全店舗'),
          stores.map(s => React.createElement('option', { key: s.id, value: s.id }, s.name))
        )
      ),
      React.createElement('div', { className: 'scroll-x' },
        React.createElement('table', null,
          React.createElement('thead', null,
            React.createElement('tr', null,
              React.createElement('th', null, '日付'),
              React.createElement('th', null, '場所'),
              React.createElement('th', null, '店舗'),
              React.createElement('th', null, 'CSV商品名'),
              React.createElement('th', null, '紐付き商品'),
              React.createElement('th', { className: 'text-right' }, '販売量'),
            )
          ),
          React.createElement('tbody', null,
            displayed.length === 0
              ? React.createElement('tr', null, React.createElement('td', { colSpan: 6, className: 'text-center text-sm', style: { padding: 20 } }, 'データがありません。CSVをアップロードしてください。'))
              : displayed.slice().reverse().slice(0, 100).map(r => {
                const store = stores.find(s => s.id === r.storeId);
                const prod = products.find(p => p.id === r.productId);
                return React.createElement('tr', { key: r.id },
                  React.createElement('td', null, r.date),
                  React.createElement('td', null, r.location || '-'),
                  React.createElement('td', null, store ? store.name : (r.storeNameRaw || '-')),
                  React.createElement('td', null, r.productNameRaw),
                  React.createElement('td', null, prod
                    ? React.createElement('span', { className: 'badge badge-green' }, prod.name)
                    : React.createElement('span', { className: 'badge badge-red' }, '未紐付き')
                  ),
                  React.createElement('td', { className: 'text-right' }, `${r.salesG.toLocaleString()}g`),
                );
              })
          )
        )
      )
    )
  );
}

// ===== 出店スケジュールページ =====
function SchedulesPage({ schedules, setSchedules, stores, salesHistory }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editId, setEditId] = useState(null);
  const [filterStore, setFilterStore] = useState('');
  const [form, setForm] = useState({ storeId: '', date: '', location: '', altLocation: '', altStoreId: '', deliveryDate: '' });
  const [csvMsg, setCsvMsg] = useState('');
  const [tab, setTab] = useState('list');
  const [unmatchedStoreRows, setUnmatchedStoreRows] = useState([]);
  const [unmatchedStoreMapping, setUnmatchedStoreMapping] = useState({});
  const [showStoreMapping, setShowStoreMapping] = useState(false);
  const [onStoreMapCommit, setOnStoreMapCommit] = useState(null); // [noStoreRows, commitFn] の配列
  const [bulkDelStore, setBulkDelStore] = useState('');
  const [bulkDelFrom, setBulkDelFrom] = useState('');
  const [bulkDelTo, setBulkDelTo] = useState('');
  const [shiftFrom, setShiftFrom] = useState('');
  const [shiftTo, setShiftTo] = useState('');
  const [shiftPreview, setShiftPreview] = useState([]);
  const [shiftMsg, setShiftMsg] = useState('');
  const [shiftAllRows, setShiftAllRows] = useState([]); // 全行キャッシュ

  const locations = useMemo(() => [...new Set(salesHistory.map(r => r.location).filter(Boolean))], [salesHistory]);

  // シフトCSV全行が変わるか期間が変わったらプレビュー更新
  useEffect(() => {
    if (!shiftAllRows.length) { setShiftPreview([]); return; }
    const filtered = shiftAllRows.filter(r => {
      const nd = r.date;
      const fromOk = !shiftFrom || nd >= shiftFrom;
      const toOk   = !shiftTo   || nd <= shiftTo;
      return fromOk && toOk;
    });
    setShiftPreview(filtered);
  }, [shiftAllRows, shiftFrom, shiftTo]);

  function openAdd() {
    setForm({ storeId: stores[0]?.id || '', date: '', location: '', altLocation: '', altStoreId: '', deliveryDate: '', extraDates: '' });
    setEditId(null); setShowAdd(true);
  }
  function openEdit(s) { setForm({ ...s, extraDates: '' }); setEditId(s.id); setShowAdd(true); }
  function save() {
    if (!form.storeId || !form.date) { alert('店舗と日付を入力してください'); return; }
    if (editId) {
      setSchedules(prev => prev.map(s => s.id === editId ? { ...form, id: editId } : s));
    } else {
      const allDates = [form.date, ...(form.extraDates || '').split(/[\n,\s]+/).filter(Boolean)];
      const normDates = [...new Set(allDates.map(d => normalizeDate(d.trim())).filter(Boolean))];
      const newItems = normDates.map(d => ({ id: generateId(), storeId: form.storeId, date: d, location: form.location, deliveryDate: form.deliveryDate, altLocation: form.altLocation, altStoreId: form.altStoreId }));
      setSchedules(prev => { const ex = new Set(prev.map(s=>`${s.date}|${s.storeId}`)); return [...prev, ...newItems.filter(s=>!ex.has(`${s.date}|${s.storeId}`))]; });
    }
    setShowAdd(false);
  }

  function del(id) {
    if (confirm('このスケジュールを削除しますか？')) setSchedules(prev => prev.filter(s => s.id !== id));
  }

  function clearAll() {
    if (confirm('スケジュールをすべて削除しますか？')) setSchedules([]);
  }

  // スケジュールCSVダウンロード（テンプレート）
  function downloadTemplate() {
    const header = '出店日,店舗名,出店場所,納品予定日,代替場所,代替店舗名';
    const example = `2025-04-01,1号車,〇〇マルシェ,2025-03-28,,
2025-04-01,2号車,△△公園,2025-03-28,,
2025-04-05,1号車,□□フェスタ,2025-04-03,〇〇マルシェ,`;
    const blob = new Blob(['\ufeff' + header + '\n' + example], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'schedule_template.csv'; a.click();
  }

  // 現在のスケジュールをCSVエクスポート
  function exportSchedules() {
    const rows = schedules.map(s => {
      const store = stores.find(st => st.id === s.storeId);
      const altStore = stores.find(st => st.id === s.altStoreId);
      return {
        出店日: s.date,
        店舗名: store?.name || '',
        出店場所: s.location || '',
        納品予定日: s.deliveryDate || '',
        代替場所: s.altLocation || '',
        代替店舗名: altStore?.name || '',
      };
    });
    const csv = Papa.unparse(rows);
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'schedules.csv'; a.click();
  }

  // シフト管理CSVハンドラ
  function handleShiftCSV(file) {
    setShiftMsg('読み込み中...');
    setShiftPreview([]);
    setShiftAllRows([]);

    function looksGarbled(rows) {
      if (!rows.length) return true;
      const sample = Object.keys(rows[0]).join('') + Object.values(rows[0]).join('');
      return sample.includes('\ufffd');
    }

    function processShiftRows(rows) {
      if (!rows.length) { setShiftMsg('データが読み取れませんでした'); return; }
      const cols = Object.keys(rows[0]);

      // ===== バックアップCSV形式（場所×日付マトリクス）の検出 =====
      // 1列目が「場所」で、残りが「1日(金)」「2日(土)」...のような形式
      const firstCol = cols[0];
      const isMatrixFormat = cols.slice(1).some(c => /^\d+日/.test(c.trim()));
      if (isMatrixFormat) {
        // ヘッダー行から年月を取得（ファイル名から推測）
        // 列名「1日(金)」→日付はshiftFromとshiftToの月から補完
        const parsed = [];
        // 月を推測：shiftFromの値を使う
        const monthStr = shiftFrom ? shiftFrom.slice(0,7) : new Date().toISOString().slice(0,7);
        rows.forEach(row => {
          const locName = String(row[firstCol]||'').trim();
          if(!locName || locName === '場所') return;
          cols.slice(1).forEach(col => {
            const staffName = String(row[col]||'').trim();
            if(!staffName || staffName === '[対象外]' || staffName === '対象外' || staffName === '') return;
            // 列名から日を取得「1日(金)」→1
            const dayMatch = col.trim().match(/^(\d+)日/);
            if(!dayMatch) return;
            const day = dayMatch[1].padStart(2,'0');
            const dateStr = monthStr + '-' + day;
            parsed.push({ date: dateStr, storeId: null, storeRaw: '', location: locName, staffName });
          });
        });
        setShiftAllRows(parsed);
        setShiftMsg(`読み込み完了: ${parsed.length}件（期間を指定してプレビューを確認してください）`);
        return;
      }

      // ===== 通常の縦持ち形式 =====
      // 列を柔軟に検出
      function findCol(keys, pred) {
        for (const k of keys) {
          const c = cols.find(c => c.trim() === k);
          if (c) return c;
        }
        for (const k of keys) {
          const c = cols.find(c => c.includes(k));
          if (c) return c;
        }
        if (pred) return cols.find(c => rows.slice(0,10).some(r => pred(String(r[c]||''))));
        return null;
      }

      const dateCol  = findCol(['日付','date','Date','出店日','シフト日'],
        v => /\d{4}[\-\/]\d{1,2}[\-\/]\d{1,2}/.test(v) || (/^\d{5,6}$/.test(v) && parseInt(v)>40000));
      const storeCol = findCol(['店舗名','店舗','号車','車両','担当車両'], null);
      const locCol   = findCol(['出店場所','場所','会場','イベント','location'], null);

      if (!dateCol) { setShiftMsg(`日付列が見つかりません。列名: [${cols.join(', ')}]`); return; }

      const parsed = [];
      for (const row of rows) {
        const dateVal  = String(row[dateCol]||'').trim();
        const storeVal = storeCol ? String(row[storeCol]||'').trim() : '';
        const locVal   = locCol   ? String(row[locCol]||'').trim()   : '';
        if (!dateVal) continue;
        const normDate = normalizeDate(dateVal);
        if (!normDate) continue;

        // 店舗マッチング
        let storeId = null;
        if (storeVal) {
          const ns = normalizeStr(storeVal);
          let m = stores.find(s => normalizeStr(s.name) === ns);
          if (!m) m = stores.find(s => { const sn=normalizeStr(s.name); return ns.includes(sn)||sn.includes(ns); });
          if (!m) { const num=storeVal.replace(/[^0-9]/g,''); if(num) m=stores.find(s=>normalizeStr(s.name).replace(/[^0-9]/g,'')===num); }
          if (m) storeId = m.id;
        }
        if (!storeId) continue; // 店舗不明行はスキップ

        parsed.push({ date: normDate, storeId, storeRaw: storeVal, location: locVal });
      }

      setShiftAllRows(parsed);
      setShiftMsg(`読み込み完了: ${parsed.length}件（期間を指定してプレビューを確認してください）`);
    }

    function tryShiftJIS() {
      Papa.parse(file, { header:true, skipEmptyLines:true, encoding:'Shift_JIS', comments:'#',
        complete: r => { if(!r.data.length) { setShiftMsg('データが読み取れませんでした'); return; } processShiftRows(r.data); },
        error: err => setShiftMsg('エラー: '+err.message)
      });
    }
    Papa.parse(file, { header:true, skipEmptyLines:true, encoding:'UTF-8', comments:'#',
      complete: r => { if(!r.data.length||looksGarbled(r.data)) tryShiftJIS(); else processShiftRows(r.data); },
      error: () => tryShiftJIS()
    });
  }

  // シフトプレビューをスケジュールに取り込む
  function commitShiftImport() {
    if (!shiftPreview.length) return;
    const toAdd = shiftPreview.map(r => ({
      id: generateId(), storeId: r.storeId, date: r.date,
      location: r.location, deliveryDate: '', altLocation: '', altStoreId: ''
    }));
    setSchedules(prev => {
      const existing = new Set(prev.map(s => `${s.date}|${s.storeId}`));
      const filtered = toAdd.filter(s => !existing.has(`${s.date}|${s.storeId}`));
      const dup = toAdd.length - filtered.length;
      setShiftMsg(`取込完了: ${filtered.length}件追加${dup>0?`（重複${dup}件スキップ）`:''}`);
      return [...prev, ...filtered];
    });
    setShiftPreview([]);
    setShiftAllRows([]);
  }

  // スケジュールCSV行処理
  function processScheduleRows(rows) {
    if (!rows.length) { setCsvMsg('データが見つかりませんでした'); return; }

    const cols = Object.keys(rows[0] || {});

    // デバッグ用：列名を表示
    console.log('CSV列名:', cols);
    console.log('先頭行サンプル:', rows[0]);

    // 列名から値を取得（完全一致優先、次に部分一致）
    function getVal(row, keys) {
      for (const k of keys) {
        if (row[k] !== undefined && String(row[k]).trim() !== '') return String(row[k]).trim();
      }
      // 部分一致
      for (const k of cols) {
        if (keys.some(kk => k.includes(kk) || kk.includes(k))) {
          if (row[k] !== undefined && String(row[k]).trim() !== '') return String(row[k]).trim();
        }
      }
      return '';
    }

    // 店舗名列を探す（列名バリエーション対応）
    function getStoreVal(row) {
      return getVal(row, ['店舗名','店舗','車両名','車両','号車','車番','担当者','担当','車']);
    }

    // 店舗マッチング
    function matchStore(val) {
      if (!val) return null;
      const ns = normalizeStr(val);
      let m = stores.find(s => normalizeStr(s.name) === ns);
      if (m) return m;
      m = stores.find(s => { const sn = normalizeStr(s.name); return ns.includes(sn) || sn.includes(ns); });
      if (m) return m;
      // 数字だけ抽出して照合（「1」→「1号車」など）
      const num = val.replace(/[^0-9]/g, '');
      if (num) {
        m = stores.find(s => normalizeStr(s.name).replace(/[^0-9]/g, '') === num);
        if (m) return m;
      }
      return null;
    }

    const readyRows = [];
    const noStoreRows = [];
    let skipNoDate = 0;

    for (const row of rows) {
      const dateVal  = getVal(row, ['出店日','日付','date','Date']);
      const storeVal = getStoreVal(row);
      const locVal   = getVal(row, ['出店場所','場所','location','会場']);
      const delVal   = getVal(row, ['納品予定日','納品日']);
      const altLocVal= getVal(row, ['代替場所','代替出店場所']);
      const altStoVal= getVal(row, ['代替店舗名','代替店舗']);

      // 完全空行はスキップ
      if (!dateVal && !storeVal) continue;
      if (!dateVal) { skipNoDate++; continue; }

      const normDate = normalizeDate(String(dateVal));
      if (!normDate) { skipNoDate++; continue; }

      const normDelivery = delVal ? normalizeDate(delVal) : '';
      const matched    = matchStore(storeVal);
      const altMatched = matchStore(altStoVal);

      if (matched) {
        readyRows.push({
          id: generateId(), storeId: matched.id, date: normDate,
          location: locVal, deliveryDate: normDelivery,
          altLocation: altLocVal, altStoreId: altMatched?.id || ''
        });
      } else {
        noStoreRows.push({
          rawName: storeVal || '(店舗名なし)', normDate, locVal,
          normDelivery, altLocVal, altStoreId: altMatched?.id || ''
        });
      }
    }

    console.log(`処理結果: ready=${readyRows.length}, noStore=${noStoreRows.length}, skipNoDate=${skipNoDate}`);

    // 取り込み実行
    function commit(extra) {
      const all = [...readyRows, ...(extra || [])];
      if (all.length === 0) {
        let msg = '取り込み可能なデータがありませんでした。';
        if (noStoreRows.length > 0) msg += ` 店舗名不明: ${noStoreRows.length}件（CSV列名: ${cols.join(', ')}）`;
        if (skipNoDate > 0) msg += ` 日付不明: ${skipNoDate}件`;
        setCsvMsg(msg);
        return;
      }
      setSchedules(prev => {
        const existing = new Set(prev.map(s => `${s.date}|${s.storeId}`));
        const toAdd = all.filter(s => !existing.has(`${s.date}|${s.storeId}`));
        const dupCount = all.length - toAdd.length;
        let msg = `完了: ${toAdd.length}件追加`;
        if (dupCount > 0) msg += `（重複${dupCount}件スキップ）`;
        if (skipNoDate > 0) msg += `、日付不明${skipNoDate}件`;
        setCsvMsg(msg);
        return [...prev, ...toAdd];
      });
    }

    if (noStoreRows.length > 0) {
      // モーダルで手動割り当て（state に配列で保持）
      setUnmatchedStoreRows(noStoreRows);
      setUnmatchedStoreMapping({});
      setShowStoreMapping(true);
      // コールバックは配列で保持（関数をstateに入れるとReactが実行してしまうため）
      setOnStoreMapCommit([noStoreRows, commit]);
      // 一致分は先に登録
      if (readyRows.length > 0) commit([]);
    } else {
      commit([]);
    }

  // スケジュールCSVアップロード

    const file = e.target.files[0];

      skipEmptyLines: true,

        const rows = results.data;
        if (!rows.length) { setCsvMsg('データが見つかりませんでした'); return; }

        let added = 0, skipped = 0;
        const newSchedules = [];

        for (const row of rows) {
          // 列名を柔軟に取得
          const dateVal = row['出店日'] || row['日付'] || row['date'] || '';
          const storeNameVal = row['店舗名'] || row['店舗'] || row['車両'] || row['号車'] || '';
          const locationVal = row['出店場所'] || row['場所'] || row['location'] || '';
          const deliveryDateVal = row['納品予定日'] || row['納品日'] || '';
          const altLocationVal = row['代替場所'] || row['代替出店場所'] || '';
          const altStoreNameVal = row['代替店舗名'] || row['代替店舗'] || '';

          if (!dateVal) { skipped++; continue; }

          // 店舗名からstoreIdを解決
          let storeId = '';
          if (storeNameVal) {
            const ns = normalizeStr(storeNameVal);
            const matched = stores.find(s => {
              const sn = normalizeStr(s.name);
              return ns === sn || ns.includes(sn) || sn.includes(ns);
            });
            if (matched) storeId = matched.id;
          }
          if (!storeId) { skipped++; continue; } // 店舗が特定できない行はスキップ
          let altStoreId = '';
          if (altStoreNameVal) {
            const ns = normalizeStr(altStoreNameVal);
            const matched = stores.find(s => normalizeStr(s.name) === ns || normalizeStr(s.name).includes(ns));
            if (matched) altStoreId = matched.id;
          }

          const normDate = normalizeDate(dateVal);
          const normDelivery = deliveryDateVal ? normalizeDate(deliveryDateVal) : '';
          if (!normDate) { skipped++; continue; } // 日付が解析できない場合はスキップ

          newSchedules.push({
            id: generateId(),
            storeId,
            date: normDate,
            location: locationVal,
            deliveryDate: normDelivery,
            altLocation: altLocationVal,
            altStoreId,
          });
          added++;
        }

        setSchedules(prev => {
          // 重複除去（同じ日付×店舗）
          const existing = new Set(prev.map(s => `${s.date}|${s.storeId}`));
          const toAdd = newSchedules.filter(s => !existing.has(`${s.date}|${s.storeId}`));
          return [...prev, ...toAdd];
        });

        setCsvMsg(`完了: ${added}件追加、${skipped}件スキップ（日付/店舗が特定できなかった行）`);
      },
      error: (err) => { setCsvMsg('エラー: ' + err.message); }
    });
    e.target.value = '';
  }

  const [refModal, setRefModal] = useState(null);
  const [refMode, setRefMode] = useState('date');
  const [refDate, setRefDate] = useState('');
  const [refLocation, setRefLocation] = useState('');
  const [refStoreId, setRefStoreId] = useState('');
  const [refValues, setRefValues] = useState({});

  useEffect(() => { saveState('forecastOverrides', overrides); }, [overrides]);

  const today = new Date().toISOString().split('T')[0];

  const upcomingSchedules = useMemo(() =>
    schedules
      .map(s => ({ ...s, _nd: normalizeDate(s.date) }))
      .filter(s => s._nd >= today && (!filterStore || s.storeId === filterStore))
      .sort((a, b) => a.storeId.localeCompare(b.storeId) || a._nd.localeCompare(b._nd)),
    [schedules, today, filterStore]
  );

  const historyIndex = useMemo(() =>
    buildHistoryIndex(salesHistory, products, productMapping),
    [salesHistory, products, productMapping]
  );

  const forecastCache = useMemo(() => {
    const cache = {};
    try {
      for (const s of upcomingSchedules) {
        if (!s || !s.id) continue;
        const base = computeForecast(s, historyIndex, products);
        cache[s.id] = { ...base };
        const ov = overrides[s.id] || {};
        for (const [pid, g] of Object.entries(ov)) cache[s.id][pid] = Number(g) || 0;
      }
    } catch(e) { console.error('ForecastPage cache error', e); }
    return cache;

  const byStore = useMemo(() => {
    const map = {};

    return map;

        rows = h.filter(r => r.date === refDate);

      } else if (refMode === 'location' && refLocation) {
        rows = h.filter(r => (r.location||'').trim() === refLocation.trim() && r.storeId === refStoreId);
        if (rows.length === 0) rows = h.filter(r => (r.location||'').trim() === refLocation.trim());

    setOverrides(prev => ({ ...prev, [refModal.scheduleId]: newOv }));

function DeliveryPage({ schedules, stores, products, salesHistory, productMapping, storeInventory, warehouseInventory, deliveries, setDeliveries, minStock }) {
  const [filterStore, setFilterStore] = useState(''); // '' = 全店舗
  const today = new Date().toISOString().split('T')[0];
  const overrides = useMemo(() => { try { return loadState('forecastOverrides', {}); } catch(e) { return {}; } }, []);

  const historyIndex = useMemo(() => buildHistoryIndex(salesHistory, products, productMapping), [salesHistory, products, productMapping]);
  const forecastCache = useMemo(() => {
    const cache = {};
    try {
      for (const s of schedules) {
        if (!s || !s.id) continue;
        const base = computeForecast(s, historyIndex, products);
        cache[s.id] = { ...base };
        const ov = overrides[s.id] || {};
        for (const [pid, g] of Object.entries(ov)) cache[s.id][pid] = Number(g) || 0;
      }
    } catch(e) { console.error('forecastCache error', e); }
    return cache;
  }, [schedules, historyIndex, products, overrides]);

  // 表示対象の店舗リスト
  const targetStores = filterStore ? stores.filter(s => s.id === filterStore) : stores;

  // 各店舗の納品データをメモ化
  const storeDeliveryData = useMemo(() => {
    const result = {};
    for (const store of stores) {
      // 今後のスケジュール（全期間、today以降）
      const ss = schedules
        .filter(s => s.storeId === store.id && normalizeDate(s.date) >= today)
        .sort((a, b) => normalizeDate(a.date).localeCompare(normalizeDate(b.date)));
      const lastDate = ss.length ? ss[ss.length - 1].date : null;
      const deliveryDate = ss.find(s => s.deliveryDate)?.deliveryDate || null;
      const needed = {};
      for (const prod of products) {
        let totalForecast = 0;
        for (const s of ss) totalForecast += (forecastCache[s.id] || {})[prod.id] || 0;
        const currentStock = (storeInventory[store.id] || {})[prod.id] || 0;
        const req = Math.max(0, totalForecast + minStock - currentStock);
        needed[prod.id] = { totalForecast, currentStock, needed: req, bags: Math.ceil(req / BAG_WEIGHT) };
      }
      result[store.id] = { ss, lastDate, deliveryDate, needed };
    }
    return result;
  }, [stores, schedules, forecastCache, products, storeInventory, minStock, today]);

  // 全店舗の全商品をまとめた納品一覧（印刷用）
  // 商品軸×店舗軸のクロス集計
  const allNeededProducts = products.filter(prod =>
    stores.some(store => (storeDeliveryData[store.id]?.needed[prod.id]?.bags || 0) > 0)
  );

  return React.createElement('div', null,

    // ===== 画面表示エリア =====
    React.createElement('div', { className: 'no-print' },
      React.createElement('div', { className: 'page-header' },
        React.createElement('h2', { className: 'page-title' }, '📦 納品管理'),
        React.createElement('div', { className: 'flex gap-8 items-center', style: { flexWrap: 'wrap' } },
          React.createElement('select', {
            value: filterStore, onChange: e => setFilterStore(e.target.value), style: { width: 120 }
          },
            React.createElement('option', { value: '' }, '全店舗'),
            stores.map(s => React.createElement('option', { key: s.id, value: s.id }, s.name))
          ),
          React.createElement('button', {
            className: 'btn btn-primary',
            onClick: () => setTimeout(() => window.print(), 100)
          }, '🖨 納品指示書を印刷（全店一覧）')
        )
      ),

      // 各店舗カード（画面）
      targetStores.map(store => {

// ===== 焙煎管理ページ =====
function RoastingPage({ products, stores, schedules, salesHistory, productMapping, storeInventory, warehouseInventory, setWarehouseInventory, minStock }) {
  const today = new Date().toISOString().split('T')[0];
  const overrides = useMemo(() => { try { return loadState('forecastOverrides', {}); } catch(e) { return {}; } }, []);

  const historyIndex = useMemo(() => buildHistoryIndex(salesHistory, products, productMapping), [salesHistory, products, productMapping]);
  const forecastCache = useMemo(() => {
    const cache = {};
    try {
      for (const s of schedules) {
        if (!s || !s.id) continue;
        const base = computeForecast(s, historyIndex, products);
        cache[s.id] = { ...base };
        const ov = overrides[s.id] || {};
        for (const [pid, g] of Object.entries(ov)) cache[s.id][pid] = Number(g) || 0;
      }
    } catch(e) { console.error('roast forecastCache error', e); }
    return cache;
  }, [schedules, historyIndex, products, overrides]);

  // 全店舗の必要袋数合計をメモ化
  const roastPlan = useMemo(() => {
    try {
      const totalNeeded = {};
      for (const store of stores) {
        const ss = schedules.filter(s => s.storeId === store.id && s.date >= today);
        for (const prod of products) {
          let totalForecast = 0;
          for (const s of ss) totalForecast += (forecastCache[s.id] || {})[prod.id] || 0;
          const currentStock = (storeInventory[store.id] || {})[prod.id] || 0;
          const needed = Math.max(0, totalForecast + minStock - currentStock);
          totalNeeded[prod.id] = (totalNeeded[prod.id] || 0) + Math.ceil(needed / BAG_WEIGHT);
        }
      }
      return products.map(prod => {
        const totalBags = totalNeeded[prod.id] || 0;
        const whStock = (warehouseInventory[prod.id] || 0) / BAG_WEIGHT;
        const netBags = Math.max(0, totalBags - Math.floor(whStock));
        const batches = Math.ceil(netBags / BATCH_BAGS);
        const roastedBags = batches * BATCH_BAGS;
        return { prod, totalBags, whStockBags: Math.floor(whStock), netBags, batches, roastedBags, excessBags: roastedBags - netBags };
      }).filter(r => r.batches > 0);
    } catch(e) { console.error('roastPlan error', e); return []; }
  }, [stores, schedules, forecastCache, products, storeInventory, warehouseInventory, minStock, today]);

  function printOrder() {
    const win = window.open('', '_blank');
    const rows = roastPlan.map(r => `
      <tr>
        <td style="padding:8px 12px;border:1px solid #ccc;">${r.prod.greenBeanName}</td>
        <td style="padding:8px 12px;border:1px solid #ccc;text-align:right;">${r.batches} バッチ(袋詰)</td>
      </tr>
    `).join('');
    win.document.write(`
      <!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
      <title>焙煎注文書</title>
      <style>
        body{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;padding:32px;font-size:13pt;}
        h1{font-size:18pt;margin-bottom:8px;}
        p{margin-bottom:16px;font-size:11pt;color:#555;}
        table{border-collapse:collapse;width:100%;}
        th{background:#f0ece8;padding:8px 12px;border:1px solid #ccc;text-align:left;font-size:13pt;}
        td{font-size:13pt;}
      </style></head><body>
      <h1>焙煎注文書</h1>
      <p>作成日: ${today}</p>
      <table><thead><tr>
        <th>商品名</th><th>数量</th>
      </tr></thead><tbody>${rows}</tbody></table>
      </body></html>
    `);
    win.document.close();
    win.print();
  }

  return React.createElement('div', null,
    React.createElement('div', { className: 'page-header' },
      React.createElement('h2', { className: 'page-title' }, '☕ 焙煎管理'),
      React.createElement('button', { className: 'btn btn-primary', onClick: printOrder }, '🖨 焙煎注文書を印刷')
    ),

    React.createElement('div', { className: 'alert alert-info mb-12' },
      `1バッチ = 生豆25kg → 焙煎豆${BATCH_BAGS}袋(各${(BAG_WEIGHT/1000)}kg = ${BATCH_WEIGHT/1000}kg)。余りが出るよう切り上げ計算。`
    ),

    React.createElement('div', { className: 'card' },
      React.createElement('div', { className: 'card-title' }, '焙煎計画'),
      React.createElement('div', { className: 'scroll-x' },
        React.createElement('table', null,
          React.createElement('thead', null,
            React.createElement('tr', null,
              React.createElement('th', null, '商品名'),
              React.createElement('th', null, '生豆名'),
              React.createElement('th', { className: 'text-right' }, '必要袋数'),
              React.createElement('th', { className: 'text-right' }, '会社在庫(袋)'),

// ===== 在庫CSVアップロード処理 =====
// 商品名を柔軟にマッチング（全角スペース・表記ゆれ対応）
function matchProductByName(csvName, products, productMapping) {
  if (!csvName) return null;
  // normalizeStr で完全正規化（全角スペース・小文字カタカナ含む）
  const clean = normalizeStr(csvName);
  // 既存マッピングで照合
  for (const [mappedCsv, pid] of Object.entries(productMapping)) {
    if (normalizeStr(mappedCsv) === clean) return products.find(p => p.id === pid) || null;
  }
  // 商品名と正規化して完全一致チェック
  const exactMatch = products.find(p => normalizeStr(p.name) === clean);
  if (exactMatch) return exactMatch;
  // productNameMatch で照合（normalizeStr適用済みの文字列で比較）
  let best = 0, bestProd = null;
  for (const p of products) {
    // normalizeStrした上でスコアリング
    const score = productNameMatch(clean, normalizeStr(p.name));
    if (score > best) { best = score; bestProd = p; }
  }
  if (best >= 0.3 && bestProd) return bestProd;
  return null;
}

// ===== 在庫数値入力コンポーネント（0クリア・Enter移動） =====
function InvNumInput({ value, onCommit, groupId }) {
  // uncontrolled-likeに扱い、フォーカス時だけ0を空欄にする
  const ref = useRef(null);

  useEffect(() => {
    if (ref.current) ref.current.value = value === 0 ? '' : String(value);
  }, [value]);

  function handleFocus() {
    const el = ref.current;
    if (!el) return;
    if (Number(el.value) === 0 || el.value === '') el.value = '';
    else el.select();
  }

  function handleBlur() {
    const el = ref.current;
    if (!el) return;
    const num = parseInt(el.value) || 0;
    el.value = num === 0 ? '' : String(num);
    onCommit(num);
  }

  function handleKeyDown(e) {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    const el = e.currentTarget;
    const num = parseInt(el.value) || 0;
    el.value = num === 0 ? '' : String(num);
    onCommit(num);
    // 同じ group-id グループ内の次のinputへ移動
    const all = Array.from(document.querySelectorAll(`input[data-invgroup="${groupId}"]`));
    const idx = all.indexOf(el);
    if (idx >= 0 && idx < all.length - 1) all[idx + 1].focus();
  }

  return React.createElement('input', {
    ref,
    type: 'number',
    'data-invgroup': groupId,
    style: { width: 100 },
    placeholder: '0',
    defaultValue: value === 0 ? '' : String(value),
    onFocus: handleFocus,
    onBlur: handleBlur,
    onKeyDown: handleKeyDown,
  });
}

// ===== 在庫管理ページ =====
function InventoryPage({ products, stores, storeInventory, setStoreInventory, warehouseInventory, setWarehouseInventory, productMapping }) {
  const [tab, setTab] = useState('store');
  const [inventoryDates, setInventoryDates] = useState(() => loadState('inventoryDates', {}));
  const [csvMsg, setCsvMsg] = useState('');
  const [unmatchedInv, setUnmatchedInv] = useState([]); // [{csvName, storeId, g}]
  const [showInvMapping, setShowInvMapping] = useState(false);
  const [invTempMapping, setInvTempMapping] = useState({}); // {idx: productId}

  useEffect(() => { saveState('inventoryDates', inventoryDates); }, [inventoryDates]);

  function setDate(key, val) {
    setInventoryDates(prev => ({ ...prev, [key]: val }));
  }

  // 在庫CSVアップロード処理
  function handleInventoryCSV(file) {
    setCsvMsg('読み込み中...');

    function looksGarbled(rows) {
      if (!rows.length) return true;
      const sample = Object.keys(rows[0]).join('') + Object.values(rows[0]).join('');
      return sample.includes('\ufffd');
    }

    function processInvRows(rows, enc) {
      if (!rows.length) { setCsvMsg('データが読み取れませんでした'); return; }
      const cols = Object.keys(rows[0]);

      // 列名を柔軟に解決
      function col(keys) {
        for (const k of keys) {
          const found = cols.find(c => c.replace(/　/g,' ').trim() === k || c.includes(k));
          if (found) return found;
        }
        return null;
      }
      const dateCol  = col(['日付','date','Date']);
      const storeCol = col(['店舗','店舗名','車両','号車']);
      const prodCol  = col(['商品名','商品']);
      const gCol     = col(['在庫値(g)','在庫(g)','在庫g','在庫値','在庫量','g']);

      if (!prodCol || !gCol) {
        setCsvMsg(`列名が見つかりません。CSV列名: ${cols.join(', ')}`);
        return;
      }

      // 店舗マッチング
      function matchStore(val) {
        if (!val) return null;
        const ns = normalizeStr(val);
        let m = stores.find(s => normalizeStr(s.name) === ns);
        if (m) return m;
        m = stores.find(s => { const sn=normalizeStr(s.name); return ns.includes(sn)||sn.includes(ns); });
        if (m) return m;
        const num = val.replace(/[^0-9]/g,'');
        if (num) { m = stores.find(s => normalizeStr(s.name).replace(/[^0-9]/g,'')===num); if(m) return m; }
        // 「倉庫」「会社」「本社」は warehouse
        if (/倉庫|会社|本社|warehouse/i.test(val)) return { id: '__warehouse__', name: '会社倉庫' };
        return null;
      }

      // 棚卸日を自動設定（最新の日付を使う）
      const dates = rows.map(r => dateCol ? normalizeDate(String(r[dateCol]||'')) : null).filter(Boolean);
      const latestDate = dates.length ? dates.sort().reverse()[0] : null;

      const newStoreInv = {}; // {storeId: {productId: g}}
      let newWarehouseInv = {};
      const unmatched = [];
      let matched = 0, skip = 0;

      for (const row of rows) {
        const storeVal = storeCol ? String(row[storeCol]||'').trim() : '';
        const prodVal  = String(row[prodCol]||'').trim();
        const gVal     = parseFloat(String(row[gCol]||'0').replace(/[^\d.]/g,'')) || 0;
        if (!prodVal) { skip++; continue; }

        const store = matchStore(storeVal);
        const prod  = matchProductByName(prodVal, products, productMapping);

        if (!prod) {
          unmatched.push({ csvName: prodVal, storeId: store?.id || storeVal, gVal });
          skip++;
          continue;
        }

        if (store?.id === '__warehouse__') {
          newWarehouseInv[prod.id] = gVal;
        } else if (store) {
          if (!newStoreInv[store.id]) newStoreInv[store.id] = {};
          newStoreInv[store.id][prod.id] = gVal;
          // 棚卸日を設定
          if (latestDate) {
            setInventoryDates(prev => ({ ...prev, ['store_' + store.id]: latestDate }));
          }
        } else {
          // 店舗不明でも商品が取れた場合はスキップ
          skip++;
          continue;
        }
        matched++;
      }

      // 在庫を更新（CSVの店舗だけ上書き、他は維持）
      // 在庫を上書き更新（CSVに含まれる店舗の在庫は丸ごと差し替え、含まれない店舗はそのまま）
      if (Object.keys(newStoreInv).length > 0) {
        setStoreInventory(prev => {
          const updated = { ...prev };
          for (const [sid, items] of Object.entries(newStoreInv)) {
            // その店舗の全商品を items で完全上書き（加算しない）
            updated[sid] = items;
          }
          return updated;
        });
      }
      if (Object.keys(newWarehouseInv).length > 0) {
        // 会社倉庫も完全上書き
        setWarehouseInventory(newWarehouseInv);
      }

      let msg = `完了: ${matched}件反映`;
      if (skip > 0) msg += `、${skip}件スキップ`;
      if (unmatched.length > 0) msg += `（商品名不明 ${unmatched.length}件）`;
      msg += ` [${enc}]`;
      setCsvMsg(msg);

      if (unmatched.length > 0) {
        setUnmatchedInv(unmatched);
        setInvTempMapping({});
        setShowInvMapping(true);
      }
    }

    function tryShiftJIS() {
      Papa.parse(file, { header:true, skipEmptyLines:true, encoding:'Shift_JIS',
        complete: r => processInvRows(r.data, 'Shift_JIS'),
        error: err => setCsvMsg('エラー: ' + err.message)
      });
    }
    Papa.parse(file, { header:true, skipEmptyLines:true, encoding:'UTF-8',
      complete: r => { if(!r.data.length || looksGarbled(r.data)) tryShiftJIS(); else processInvRows(r.data,'UTF-8'); },
      error: () => tryShiftJIS()
    });
  }

  // 未照合商品のマッピング適用
  function applyInvMapping() {
    const newSI = { ...storeInventory };
    const newWH = { ...warehouseInventory };
    unmatchedInv.forEach((item, i) => {
      const pid = invTempMapping[i];
      if (!pid) return;
      if (item.storeId === '__warehouse__') {
        newWH[pid] = item.gVal;
      } else {
        const store = stores.find(s => s.id === item.storeId);
        if (store) {
          if (!newSI[store.id]) newSI[store.id] = {};
          newSI[store.id][pid] = item.gVal;
        }
      }
    });
    setStoreInventory(newSI);
    setWarehouseInventory(newWH);
    setShowInvMapping(false);
    setCsvMsg(prev => prev + '（手動マッピング適用済み）');
  }

  return React.createElement('div', null,
    React.createElement('div', { className: 'page-header' },
      React.createElement('h2', { className: 'page-title' }, '🏪 在庫管理')
    ),

    // 未照合商品マッピングモーダル
    showInvMapping && React.createElement('div', { className: 'modal-overlay' },
      React.createElement('div', { className: 'modal' },
        React.createElement('div', { className: 'modal-header' },
          React.createElement('span', { className: 'modal-title' }, '⚠ 商品名の手動割り当て'),
          React.createElement('button', { className: 'modal-close', onClick: () => setShowInvMapping(false) }, '✕')
        ),
        React.createElement('p', { className: 'text-sm mb-12' }, 'CSV内の商品名が自動照合できませんでした。対応商品を選んでください。'),
        unmatchedInv.map((item, i) =>
          React.createElement('div', { key: i, className: 'form-group mb-12' },
            React.createElement('label', null,

            ),
            React.createElement('select', {
              value: invTempMapping[i] || '',
              onChange: e => setInvTempMapping(prev => ({ ...prev, [i]: e.target.value })),
              style: { width: '100%' }
            },
              React.createElement('option', { value: '' }, '-- スキップ --'),
              products.map(p => React.createElement('option', { key: p.id, value: p.id }, p.name))
            )
          )
        ),
        React.createElement('div', { className: 'flex gap-8 mt-16' },
          React.createElement('button', { className: 'btn btn-primary', onClick: applyInvMapping }, '適用'),
          React.createElement('button', { className: 'btn btn-secondary', onClick: () => setShowInvMapping(false) }, 'スキップして閉じる'),
        )
      )
    ),

    // CSVアップロードカード
    React.createElement('div', { className: 'card mb-12' },
      React.createElement('div', { className: 'card-title' }, '📂 在庫CSVをアップロード'),
      React.createElement('div', { className: 'alert alert-info', style: { marginBottom: 10 } },
        React.createElement('div', { style: { fontSize: 12 } }, '列名: 日付, 店舗（または「倉庫」「会社」）, 商品名, 在庫値(g)'),
        React.createElement('div', { style: { fontSize: 11, marginTop: 3, color: 'var(--text2)' } }, '店舗名は登録済み店舗と自動照合。商品名は表記ゆれも自動補正します。')
      ),
      React.createElement(DropZone, {

    setProducts(prev => prev.map(p => p.id === editId ? { ...form } : p));

  }

  function addProduct() {
    const newP = { id: generateId(), name: '新商品', greenBeanName: '', limitedType: null, limitedLabel: '' };
    setProducts(prev => [...prev, newP]);

  function del(id) {
    if (confirm('この商品を削除しますか？')) setProducts(prev => prev.filter(p => p.id !== id));

  // ドラッグ並び替え
