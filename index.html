// ===== バックアップページ =====
function BackupPage({ products, stores, salesHistory, schedules, storeInventory,
  warehouseInventory, productMapping, minStock,
  setProducts, setStores, setSalesHistory, setSchedules,
  setStoreInventory, setWarehouseInventory, setProductMapping, setMinStock }) {

  const [restoreMsg, setRestoreMsg] = useState('');
  const today = new Date().toISOString().split('T')[0];

  // 全データをJSONとしてダウンロード
  function exportBackup() {
    const data = {
      version: 1,
      exportedAt: new Date().toISOString(),
      products, stores, salesHistory, schedules,
      storeInventory, warehouseInventory, productMapping, minStock,
      forecastOverrides: loadState('forecastOverrides', {}),
      inventoryDates: loadState('inventoryDates', {}),
    };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `coffee_backup_${today}.json`;
    a.click();
  }

  // JSONバックアップを復元
  function handleRestore(file) {
    setRestoreMsg('読み込み中...');
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.version) throw new Error('バックアップファイルの形式が正しくありません');
        if (!confirm('現在のすべてのデータをバックアップで上書きします。よろしいですか？')) {
          setRestoreMsg('キャンセルしました');
          return;
        }
        if (data.products)          setProducts(data.products);
        if (data.stores)            setStores(data.stores);
        if (data.salesHistory)      setSalesHistory(data.salesHistory);
        if (data.schedules)         setSchedules(data.schedules);
        if (data.storeInventory)    setStoreInventory(data.storeInventory);
        if (data.warehouseInventory) setWarehouseInventory(data.warehouseInventory);
        if (data.productMapping)    setProductMapping(data.productMapping);
        if (data.minStock !== undefined) setMinStock(data.minStock);
        if (data.forecastOverrides) saveState('forecastOverrides', data.forecastOverrides);
        if (data.inventoryDates)    saveState('inventoryDates', data.inventoryDates);
        setRestoreMsg(`✅ 復元完了（バックアップ作成日時: ${data.exportedAt || '不明'}）`);
      } catch(err) {
        setRestoreMsg('❌ エラー: ' + err.message);
      }
    };
    reader.readAsText(file, 'utf-8');
  }

  const totalSize = (() => {
    try {
      let total = 0;
      for (const k of Object.keys(localStorage)) {
        total += (localStorage.getItem(k) || '').length;
      }
      return (total / 1024).toFixed(1);
    } catch { return '?'; }
  })();

  return React.createElement('div', null,
    React.createElement('div', { className: 'page-header' },
      React.createElement('h2', { className: 'page-title' }, '💾 バックアップ・復元')
    ),

    React.createElement('div', { className: 'alert alert-info mb-12' },
      'データはブラウザのlocalStorageに保存されています。ブラウザのデータ削除やPC変更時に消えます。定期的にバックアップを保存してください。'
    ),

    React.createElement('div', { className: 'grid-2' },
      // エクスポートカード
      React.createElement('div', { className: 'card' },
        React.createElement('div', { className: 'card-title' }, '📤 バックアップをダウンロード'),
        React.createElement('div', { className: 'grid-3', style: { marginBottom: 16 } },
          React.createElement('div', { className: 'stat-card' },
            React.createElement('div', { className: 'stat-label' }, '販売実績'),
            React.createElement('div', { className: 'stat-value', style: { fontSize: 20 } }, salesHistory.length,
              React.createElement('span', { className: 'stat-unit' }, '件'))
          ),
          React.createElement('div', { className: 'stat-card' },
            React.createElement('div', { className: 'stat-label' }, 'スケジュール'),
            React.createElement('div', { className: 'stat-value', style: { fontSize: 20 } }, schedules.length,
              React.createElement('span', { className: 'stat-unit' }, '件'))
          ),
          React.createElement('div', { className: 'stat-card' },
            React.createElement('div', { className: 'stat-label' }, '保存サイズ'),
            React.createElement('div', { className: 'stat-value', style: { fontSize: 20 } }, totalSize,
              React.createElement('span', { className: 'stat-unit' }, 'KB'))
          ),
        ),
        React.createElement('p', { className: 'text-sm', style: { marginBottom: 16 } },
          `すべてのデータ（実績・スケジュール・在庫・商品設定・焙煎データ）をJSONファイルに保存します。`
        ),
        React.createElement('button', {
          className: 'btn btn-primary',
          style: { width: '100%', padding: '12px' },
          onClick: exportBackup
        }, `💾 バックアップをダウンロード (${today})`)
      ),

      // インポートカード
      React.createElement('div', { className: 'card' },
        React.createElement('div', { className: 'card-title' }, '📥 バックアップから復元'),
        React.createElement('p', { className: 'text-sm', style: { marginBottom: 12, color: 'var(--red)' } },
          '⚠ 復元すると現在のデータはすべて上書きされます。'
        ),
        React.createElement(DropZone, {
          accept: '.json',
          message: 'バックアップJSONファイルをドロップまたはクリックして選択',
          subMessage: '以前ダウンロードした coffee_backup_*.json ファイル',
          status: restoreMsg,
          onFile: handleRestore
        })
      )
    )
  );
}

  const appEl = document.getElementById('app');
  if(appEl && !appEl._reactRoot) {
    const root = ReactDOM.createRoot(appEl);
    root.render(React.createElement(App));
    appEl._reactRoot = true;
  }
};

</script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCNxDr8wqq-dIfI7ns9mZ6GySQkP0qAN1I",
  authDomain: "shift-app-920a1.firebaseapp.com",
  projectId: "shift-app-920a1",
  storageBucket: "shift-app-920a1.firebasestorage.app",
  messagingSenderId: "393055910720",
  appId: "1:393055910720:web:97b30c30b3f3b85ba758a5"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
let currentUser = null;
let saveTimer = null;

function fbSetStatus(msg) {
  const el = document.getElementById('fb-save-status');
  if(el) el.textContent = msg;
}

document.getElementById('login-btn').addEventListener('click', async () => {
  document.getElementById('login-loading').style.display = 'block';
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch(e) {
    document.getElementById('login-loading').style.display = 'none';
    alert('ログインに失敗しました。\n' + e.message);
  }
});

window.doSignOut = async () => {
  if(confirm('ログアウトしますか？')) await signOut(auth);
};

async function loadFromFirestore() {
  if(!currentUser) return;
  try {
    const ref = doc(db, 'coffee_users', currentUser.uid, 'data', 'main');
    const snap = await getDoc(ref);
    if(snap.exists()) {
      const d = snap.data();
      if(d && Object.keys(d).length > 0) {
        _initFromFirestore(d);
        fbSetStatus('復元完了');
        setTimeout(()=>fbSetStatus(''), 2000);
      }
    }
  } catch(e) {
    console.error('Firestore読み込みエラー:', e);
    fbSetStatus('読み込み失敗: ' + e.message);
  }
}

// シフト管理アプリからスケジュールを読み込む
window._loadShiftFromFirestore = async (month) => {
  if(!currentUser) return null;
  try {
    const ref = doc(db, 'shift_schedules', currentUser.uid, 'data', month);
    const snap = await getDoc(ref);
    if(snap.exists()) {
      return snap.data();
    }
    return null;
  } catch(e) {
    console.error('シフト読み込みエラー:', e);
    return null;
  }
};

window._saveToFirestore = async (data) => {
  if(!currentUser) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      const ref = doc(db, 'coffee_users', currentUser.uid, 'data', 'main');
      // undefinedの値を除去してからFirestoreに保存
      const cleanData = JSON.parse(JSON.stringify(data, (key, val) => val === undefined ? null : val));
      console.log('Firestore保存データ:', Object.keys(cleanData), '件');
      await setDoc(ref, cleanData);
      fbSetStatus('✓ 保存済み');
      setTimeout(()=>fbSetStatus(''), 2000);
    } catch(e) {
      console.error('Firestore保存エラー:', e);
      fbSetStatus('⚠ 保存失敗');
    }
  }, 1000);
};

onAuthStateChanged(auth, async (user) => {
  if(user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-body').style.display = 'block';
    document.getElementById('fb-user-name').textContent = user.displayName;
    // Firestoreからデータを読み込んでからReactをマウント
    await loadFromFirestore();
    if(window._mountReactApp) window._mountReactApp();
  } else {
    currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-body').style.display = 'none';
  }
});
</script>

</body>
</html>
